<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>FireRed Sprite Studio</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

</head>

<body>

<h1>🔥 FireRed Sprite Studio</h1>

<input type="file" id="upload" accept="image/*">

<br>

<button onclick="convertSprite()">Convert Sprite</button>

<br>

<canvas id="canvas" width="64" height="64"></canvas>

<h3>Palette (Drag to Reorder)</h3>
<div id="palette"></div>

<br>

<a id="download" download="firered_sprite.png">
<button>Download Sprite</button>
</a>

<script src="app.js"></script>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('service-worker.js');
}
</script>

</body>
</html>
